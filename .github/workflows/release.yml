# Windows installer build + release for Specification Formatter.
#
# What it does:
#   * push a tag  vX.Y.Z  -> the `build` job builds the installer + latest.json,
#                            then the tag-only `publish` job attaches both to a
#                            GitHub Release. The installed app's updater fetches
#                            releases/latest/download/latest.json to discover it.
#   * pull_request / workflow_dispatch (packaging-related changes) -> the `build`
#                            job builds + self-checks + compiles the installer
#                            WITHOUT publishing, and uploads the artifacts, so the
#                            whole Windows packaging pipeline is validated before
#                            any release.
#
# Cutting a release (see docs/RELEASE_WINDOWS.md for the full runbook):
#   1. Bump __version__ in spec_formatter/__init__.py (the single source of truth).
#   2. Commit, then:  git tag v1.2.3 && git push origin v1.2.3
#   3. This workflow builds and publishes the release automatically. A tag with
#      an `rcN` suffix is published as a GitHub *pre-release*, so it never
#      becomes `releases/latest` and is not auto-offered to stable installs.
#
# Security posture:
#   * The `build` job executes repo-controlled code (PyInstaller runs the spec
#     and imports the package), so it is READ-ONLY: `contents: read`, and the
#     checkout does not persist the git credential. A PR build therefore never
#     holds a write-capable token.
#   * Only the `publish` job has `contents: write`, it is gated to tag refs, and
#     it runs NO repo code -- it just downloads the built artifact and calls `gh`.
#   * Third-party actions are pinned to immutable commit SHAs (the trailing
#     comment is the human-readable version).
#
# NOTE TO MAINTAINER: the action SHAs below were pinned from their release tags
# but could not be re-verified against the GitHub API from the build sandbox.
# Confirm them (or let Dependabot manage them) before relying on this workflow --
# a stale/incorrect SHA fails loudly at that step, it is never a silent gap.
name: Release (Windows installer)

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "packaging/windows/**"
      - ".github/workflows/release.yml"
      - "spec_formatter/updates.py"
      - "spec_formatter/app_paths.py"
      - "spec_formatter/__init__.py"
  workflow_dispatch:

# Least privilege by default; the tag-gated publish job elevates to write.
permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    # Read-only: this job runs PR-controlled code (PyInstaller executes the spec
    # and imports the package). No write token is ever exposed to it.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Don't leave a push-capable credential in .git/config for later steps.
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "^refs/tags/v", ""
          } else {
            $v = python -c "import ast,pathlib; src=pathlib.Path('spec_formatter/__init__.py').read_text(encoding='utf-8'); print(next(n.value.value for n in ast.walk(ast.parse(src)) if isinstance(n,ast.Assign) and any(getattr(t,'id',None)=='__version__' for t in n.targets)))"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved version: $v"

      - name: Guard - tag matches the version literal
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        # Checks the tag against spec_formatter/__init__.py::__version__ (the
        # version the frozen app reports to the updater). A half-bumped tag would
        # otherwise ship an installer stuck in a perpetual "update available" loop.
        run: python packaging/windows/check_release_version.py --tag "${{ github.ref_name }}"

      - name: Install app + build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build one-folder app (PyInstaller)
        shell: pwsh
        run: pyinstaller packaging/windows/specification-formatter.spec --noconfirm --clean

      - name: Smoke - frozen exe self-check
        shell: pwsh
        run: |
          $env:SPEC_FORMATTER_SELFCHECK_OUT = "$PWD\selfcheck.txt"
          $p = Start-Process -FilePath "dist\SpecificationFormatter\SpecificationFormatter.exe" `
                 -ArgumentList "--selfcheck" -Wait -PassThru
          if (Test-Path selfcheck.txt) { Get-Content selfcheck.txt }
          if ($p.ExitCode -ne 0) {
            Write-Error "Frozen exe self-check failed (exit $($p.ExitCode)) - a hidden import is likely missing from the spec."
            exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" /DMyAppVersion=${{ steps.ver.outputs.version }} packaging\windows\installer.iss

      - name: Generate update manifest (latest.json)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/v$v/SpecificationFormatterSetup.exe"
          python packaging/windows/make_manifest.py `
            --version $v `
            --installer dist/installer/SpecificationFormatterSetup.exe `
            --url $url `
            --out dist/installer/latest.json `
            --notes "Specification Formatter v$v. See the release notes for details." `
            --published-at (Get-Date -Format "yyyy-MM-dd")
          Get-Content dist/installer/latest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: windows-installer
          path: |
            dist/installer/SpecificationFormatterSetup.exe
            dist/installer/latest.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    # Tag refs only. This job runs NO repo-controlled code -- it downloads the
    # already-built artifact and calls `gh` -- so holding a write token here does
    # not expose the repo to PR-supplied build steps.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release / upload assets
      actions: read      # download-artifact reads the run's artifact
    steps:
      - name: Download built installer
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: windows-installer
          path: artifact

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes=$'Windows installer for Specification Formatter '"$tag"$'.\n\n'
          notes+=$'Download **SpecificationFormatterSetup.exe** below and run it. '
          notes+=$'The app is not code-signed, so Windows SmartScreen may warn on '
          notes+=$'first run - choose **More info** then **Run anyway**.\n\n'
          notes+=$'Existing installs will offer this update automatically.'

          # A release-candidate tag (vX.Y.ZrcN) is published as a pre-release so
          # GitHub never marks it "latest" -- the updater reads
          # releases/latest/download/latest.json, so stable installs are not
          # auto-offered an RC.
          flags=(--verify-tag --title "Specification Formatter ${tag}" --notes "${notes}")
          if [[ "${version}" == *rc* ]]; then
            flags+=(--prerelease)
          else
            flags+=(--latest)
          fi

          assets=(artifact/SpecificationFormatterSetup.exe artifact/latest.json)
          if ! gh release create "${tag}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" "${flags[@]}"; then
            # Release already exists (e.g. a re-run) - replace the assets.
            gh release upload "${tag}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          fi
